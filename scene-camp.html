<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Temp Camp Scene</title>
  <link rel="stylesheet" href="wedpml.css">
</head>

<body class="scene-page">

<h2 class="scene-title">🏕 Temp Camp - Find the Mistake</h2>

<!-- ✅ CONTAINER (WAJIB ADA WRONG CLICK) -->
<div class="scene-container" onclick="wrongClick(event)">

  <!-- ✅ GAMBAR -->
  <img src="Assets/scenes/TempCamp.jpeg" alt="Temp Camp Scene">

  <!-- ✅ 1. BAKAR SAMPAH (KANAN) -->
  <div class="spot"
       style="top:35%; left:65%; width:18%; height:22%;"
       onclick="foundCamp(1); event.stopPropagation();"></div>

  <!-- ✅ 2. Rokok (TENGAH BAWAH) -->
  <div class="spot"
       style="top:65%; left:60%; width:5%; height:5%;"
       onclick="foundCamp(2); event.stopPropagation();"></div>

  <!-- ✅ 3. SAMPAH BERSERAKAN (KIRI BAWAH) -->
  <div class="spot"
       style="top:70%; left:10%; width:20%; height:18%;"
       onclick="foundCamp(3); event.stopPropagation();"></div>

</div>

<!-- ✅ FEEDBACK TEXT -->
<p id="info-camp" class="info-text"></p>

<script src="wedpml.js"></script>

</body>
</html>
