<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eco Game</title>
  <link rel="stylesheet" href="wedpml.css">
</head>

<body class="eco-page">

<!-- ===================== -->
<!-- TITLE -->
<!-- ===================== -->
<h2 class="eco-title">
  🌱 Eco Game
</h2>

<p style="text-align:center; margin-top:-10px;">
  Pilih aktivitas untuk meningkatkan awareness lingkungan
</p>

<!-- ===================== -->
<!-- GAME MENU -->
<!-- ===================== -->
<div class="eco-container">

  <!-- OFFICE -->
  <div class="eco-card" onclick="openScene('office')">
    <img src="Assets/scenes/Office.png" alt="Office">
    <div class="eco-overlay">
      <p>Office</p>
    </div>
  </div>

  <!-- WORKSHOP -->
  <div class="eco-card" onclick="openScene('workshop')">
    <img src="Assets/scenes/Workshop.jpeg" alt="Workshop">
    <div class="eco-overlay">
      <p>Workshop</p>
    </div>
  </div>

  <!-- CAMP -->
  <div class="eco-card" onclick="openScene('camp')">
    <img src="Assets/scenes/TempCamp.jpeg" alt="Temp Camp">
    <div class="eco-overlay">
      <p>Temp Camp</p>
    </div>
  </div>

  <!-- PUZZLE -->
  <div class="eco-card" onclick="openPuzzle()">
    <img src="Assets/slide/slide5-closing.png" alt="Enviro Hero">
    <div class="eco-overlay">
      <p>Enviro Hero</p>
    </div>
  </div>

</div>

<script src="wedpml.js"></script>

</body>
</html>
