<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workshop Scene</title>
  <link rel="stylesheet" href="wedpml.css">
</head>

<body class="scene-page">

<h2 class="scene-title">🛠 Workshop - Find the Mistake</h2>

<!-- ✅ container wajib ada wrongClick -->
<div class="scene-container" onclick="wrongClick(event)">

  <!-- ✅ GAMBAR -->
  <img src="Assets/scenes/Workshop.jpeg" class="scene-img" alt="Workshop Scene">

  <!-- ✅ SPOT 1: OIL SPILL -->
  <div class="spot"
       style="top:40%; left:60%; width:30%; height:40%;"
       onclick="foundWorkshop(1); event.stopPropagation();"></div>

  <!-- ✅ SPOT 2: SAMPAH -->
  <div class="spot"
       style="top:50%; left:5%; width:30%; height:50%;"
       onclick="foundWorkshop(2); event.stopPropagation();"></div>

  <!-- ✅ SPOT 3: LIMBAH OLI -->
  <div class="spot"
       style="top:40%; left:25%; width:18%; height:10%;"
       onclick="foundWorkshop(3); event.stopPropagation();"></div>

</div>

<!-- ✅ FEEDBACK TEXT -->
<p id="info-workshop" class="info-text"></p>

<script src="wedpml.js"></script>

</body>
</html>
